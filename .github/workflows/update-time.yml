name: 自动更新北京时间
on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
jobs:
  update-time:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: 写入当前北京时间
        run: |
          TZ='Asia/Shanghai' date '+当前北京时间：%Y年%m月%d日 %H:%M:%S' > README.md
      - name: 提交更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "⏰ 更新北京时间"
          git push
