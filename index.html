<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>北京时间</title>
<style>
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #1a1a2e;
    color: #eee;
  }
  #clock {
    font-size: 4rem;
    font-weight: bold;
    margin: 1rem;
    color: #00ff88;
  }
  button {
    font-size: 1.2rem;
    padding: 1rem 2rem;
    cursor: pointer;
    background: #00ff88;
    color: #1a1a2e;
    border: none;
    border-radius: 10px;
    font-weight: bold;
  }
  #hint {
    margin-top: 1.5rem;
    color: #ccc;
    font-size: 1rem;
    max-width: 500px;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>
<h2>当前北京时间</h2>
<div id="clock"></div>
<button id="sendBtn">📤 发送当前时间给 DeepSeek</button>
<div id="hint">
  ✅ 已复制！<br><br>
  1️⃣ 如果 DeepSeek 页面没自动打开，请点击<a href="https://chat.deepseek.com/" target="_blank">这里</a><br>
  2️⃣ 在输入框里 <b>粘贴（Ctrl+V 或长按粘贴）</b><br>
  3️⃣ 点击输入框旁边的 🔍 <b>联网搜索</b> 按钮<br>
  4️⃣ 点击发送按钮
</div>

<script>
function updateClock() {
  const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
  document.getElementById('clock').textContent = now;
}
setInterval(updateClock, 200);
updateClock();

document.getElementById('sendBtn').addEventListener('click', () => {
  const timeStr = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
  const url = window.location.origin + window.location.pathname;
  const prompt = `请访问 ${url} 获取当前精确的北京时间，然后基于这个时间来回答我的问题。`;
  navigator.clipboard.writeText(prompt).then(() => {
    document.getElementById('hint').style.display = 'block';
    window.open('https://chat.deepseek.com/', '_blank');
  }).catch(() => {
    document.getElementById('hint').style.display = 'block';
    window.open('https://chat.deepseek.com/', '_blank');
  });
});
</script>
</body>
</html>
